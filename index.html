<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲Dice Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./mystyle.css">
    <script type="text/javascript" src="./script.js"></script>

</head>
<body>
    <div class="container m-5">
        <h1 class="heading">🎲Dice Game</h1>
        <button onclick="switchdice()" class="btn btn-outline-light play"><h2 class="text-center subhead">Press to play</h2></button>
        <div class="row m-5" >
        <div class="col-md-6 col-sm-12">
            <p class="player player1">Player 1</p>
            <img src="./images/diceof 6.png" class="dice dice1">
        </div>
        <div class="col-md-6 col-sm-12">
            <p class="player player2"> Player 2</p>
            <img src="./images/diceof 6.png"  class="dice dice2">
        </div>
        </div>
        <div class="row m-5 ">
            <div class="col-md-6 col-sm-12">
                <input type="text" name="p1" class="name1" placeholder="Player 1 Name">
                <button class="nameBtn btn-light" onclick="switchnamep1()">Enter</button>
            </div>
            <div class="col-md-6 col-sm-12">
                <input type="text" name="p2" class="name2" placeholder="Player 2 Name">
                <button class="nameBtn btn-light" onclick="switchnamep2()">Enter</button>
            </div>
        </div>
    </div>
</body>
</html>
